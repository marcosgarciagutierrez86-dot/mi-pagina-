<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pedido Confirmado! - Don Cheto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #27f5354f;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .tarjeta-exito {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .icono-check {
            font-size: 60px;
            color: #27f535;
            margin-bottom: 20px;
        }
        h1 { color: #1a365d; margin-bottom: 10px; }
        p { color: #555; font-size: 16px; line-height: 1.5; }
        .tiempo-entrega {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            margin: 15px 0;
            border: 1px solid #ffeeba;
        }
        .btn-volver {
            display: inline-block;
            background-color: rgb(255, 149, 0);
            color: #1a365d;
            text-decoration: none;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 5px;
            border: 2px solid black;
            margin-top: 15px;
            transition: all 0.2s;
        }
        .btn-volver:hover {
            background-color: #1a365d;
            color: white;
            border-color: #1a365d;
        }
    </style>
</head>
<body>

    <div class="tarjeta-exito">
        <i class="fas fa-check-circle icono-check"></i>
        <h1>¡Pedido Recibido!</h1>
        <p>Tu orden ha sido registrada con éxito en <strong>Don Cheto El Abarrotero</strong>.</p>
        
        <div class="tiempo-entrega">
            <i class="fas fa-clock"></i> Tu pedido será entregado en un lapso de 3 a 4 horas.
        </div>

        <p>Nos mantendremos en contacto para coordinar la entrega de tus mercancías.</p>
        
        <a href="Mi Pagina.html" class="btn-volver">Volver al Inicio</a>
    </div>

</body>
</html>

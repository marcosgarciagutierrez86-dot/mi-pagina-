<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Don Cheto El Abarrotero</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        nav { 
            padding: 20px; 
            background-color: rgba(255,255,255,0.7); 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            flex-wrap: wrap; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn-navegacion { 
            background-color: rgb(255, 149, 0); 
            color: #1a365d; 
            font-size: 16px; 
            text-decoration: none; 
            font-weight: bold; 
            border: 2px solid #000; 
            font-family: Arial, sans-serif; 
            padding: 8px 16px; 
            border-radius: 5px;
        }
        

        .contenedor-resumen-pago {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 450px;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        .seccion-total, .seccion-pago { 
            text-align: center; 
            background-color: #fff; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .precio-final { font-size: 32px; color: green; font-weight: bold; }

        .opciones-pago { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .opcion-radio {
            display: flex; align-items: center; gap: 10px; padding: 12px;
            border: 2px solid #ccc; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        
        .btn-pagar {
            background-color: #27f535; color: #1a365d; border: 2px solid #1a365d;
            padding: 12px 24px; font-size: 18px; font-weight: bold; border-radius: 8px;
            cursor: pointer; width: 100%;
        }

        .carrito-contenedor { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; font-family: Arial, sans-serif; padding: 10px; }
        .producto { border: 2px solid #ccc; border-radius: 15px; padding: 20px; background-color: #f9f9f9; width: 220px; text-align: center; }
        .producto img { width: 130px; height: 130px; object-fit: contain; border-radius: 10px; }
        .producto h3 { font-size: 18px; margin: 10px 0; color: #333; height: 44px; display: flex; align-items: center; justify-content: center; }
        .btn-cantidad { color: green; background-color: #fff; border: 1px solid green; cursor: pointer; font-size: 20px; padding: 2px 12px; border-radius: 5px; }
        .producto-span { font-size: 22px; color: blue; font-weight: bold; margin: 0 10px; }
        .btn-eliminar { background-color: red; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold;}
    </style>
</head>
<body style="background-color: #27f5354f; margin: 0; padding: 20px;">
    
    <nav>
        <a href="Mi Pagina.html" title="Ir al Inicio"><i class="fas fa-home" style="font-size: 25px; color: black; margin-right: 10px;"></i></a>
        <a href="botanas.html" class="btn-navegacion">Botanas</a>
        <a href="bebidas.html" class="btn-navegacion">Bebidas</a>
        <a href="lácteos.html" class="btn-navegacion">Lácteos</a>
        <a href="plastifiestas.html" class="btn-navegacion">Plastifiestas</a>
        <a href="semillas.html" class="btn-navegacion">Semillas</a>
        <a href="limpieza.html" class="btn-navegacion">Limpieza</a>
    </nav>

    <div class="contenedor-resumen-pago" id="modulo-pago">
        <div class="seccion-total">
            <h2>Total de tu Compra:</h2>
            <span class="precio-final" id="gran-total">$0.00</span>
        </div>

        <div class="seccion-pago" id="formulario-pago">
            <h3>Selecciona tu Método de Pago:</h3>
            <div class="opciones-pago">
                <label class="opcion-radio">
                    <input type="radio" name="metodo_pago" value="efectivo" checked>
                    <i class="fas fa-money-bill-wave" style="color: green;"></i> <span>Pago en Efectivo (Contra Entrega)</span>
                </label>
                <label class="opcion-radio">
                    <input type="radio" name="metodo_pago" value="transferencia">
                    <i class="fas fa-university" style="color: #0056b3;"></i> <span>Transferencia SPEI</span>
                </label>
                <label class="opcion-radio">
                    <input type="radio" name="metodo_pago" value="tarjeta">
                    <i class="fas fa-credit-card" style="color: #ff5733;"></i> <span>Pago con Tarjeta</span>
                </label>
            </div>
            <button class="btn-pagar" onclick="procesarCompra()">
                <i class="fas fa-shopping-bag"></i> Finalizar Pedido
            </button>
        </div>
    </div>

    <div class="carrito-contenedor" id="carrito-contenedor"></div>

    <script>
        function renderizarCarrito() {
            const contenedor = document.getElementById('carrito-contenedor');
            const moduloPago = document.getElementById('modulo-pago');
            
            // Leemos la memoria del navegador
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            
            if(carrito.length === 0) {
                contenedor.innerHTML = "<h2 style='font-family:Arial; color:#333; text-align:center; width:100%; margin-top:40px;'>Tu carrito está vacío.</h2>";
                document.getElementById('gran-total').textContent = "$0.00";
                moduloPago.style.display = "none"; 
                return;
            }

            moduloPago.style.display = "flex"; 
            contenedor.innerHTML = ""; 
            let granTotal = 0;

            carrito.forEach((producto, index) => {
                // Forzamos conversión a números por si acaso se guardaron como texto
                let precioN = parseFloat(producto.precio) || 0;
                let cantidadN = parseInt(producto.cantidad) || 1;
                
                let totalPorProducto = precioN * cantidadN;
                granTotal += totalPorProducto;

                contenedor.innerHTML += `
                    <div class="producto">
                        <img src="${producto.imagen}" alt="${producto.nombre}">
                        <h3>${producto.nombre}</h3>
                        <button class="btn-cantidad" onclick="cambiarCantidad(${index}, -1)">-</button>
                        <span class="producto-span">${cantidadN}</span>
                        <button class="btn-cantidad" onclick="cambiarCantidad(${index}, 1)">+</button>
                        <p><strong>Total: $${totalPorProducto.toFixed(2)}</strong></p>
                        <button class="btn-eliminar" onclick="eliminarProducto(${index})">Eliminar</button>
                    </div>
                `;
            });

            document.getElementById('gran-total').textContent = `$${granTotal.toFixed(2)}`;
        }

        function cambiarCantidad(index, cambio) {
            let carrito = JSON.parse(localStorage.getItem('carrito'));
            carrito[index].cantidad += cambio;
            if(carrito[index].cantidad < 1) carrito[index].cantidad = 1;
            localStorage.setItem('carrito', JSON.stringify(carrito));
            renderizarCarrito();
        }

        // Corregido: Elimina el índice exacto y actualiza la pantalla de forma inmediata
        function eliminarProducto(index) {
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            carrito.splice(index, 1);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            renderizarCarrito();
        }

        function procesarCompra() {
            const metodoSeleccionado = document.querySelector('input[name="metodo_pago"]:checked').value;
            const total = document.getElementById('gran-total').textContent;

            if(metodoSeleccionado === 'efectivo') {
                alert(`¡Pedido Confirmado!\nSu total es de ${total}. Pagará en efectivo al recibir su mercancía.`);
            } else {
                alert(`¡Pedido Registrado!\nPor favor, realice la transferencia de ${total} a la cuenta de Don Cheto.\n¡Gracias por su compra!`);
            }

            localStorage.removeItem('carrito');
            window.location.href = "pago-exitoso.html";
        }

        renderizarCarrito();
    </script>
</body>
</html>
